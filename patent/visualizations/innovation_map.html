<!DOCTYPE html><html><head><meta charset="utf-8"><title>Innovation Map — SIMULATED</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script><style>body{margin:0;padding:14px;background:#fff;font-family:sans-serif;}.t{font-size:15px;font-weight:500;margin-bottom:3px;}.s{font-size:11px;color:#6b7280;margin-bottom:14px;}</style></head><body><div class="t">V18: Innovation Map — F_composite vs novelty vs cost</div><div class="s">T2+T5 · Bubble size = cost · Top-right frontier = novel + high-F · SIMULATED</div><div style="position:relative;height:340px;"><canvas id="c"></canvas></div><script>var D=[{"name": "C+Si+Al (house)", "F": 0.64, "novelty": 0.53, "cost": 0.45}, {"name": "Ti+V+Cr (aerospace)", "F": 0.71, "novelty": 0.82, "cost": 0.85}, {"name": "Fe+C+Mn (steel)", "F": 0.55, "novelty": 0.2, "cost": 0.15}, {"name": "Cu+Zn+Sn (bronze)", "F": 0.48, "novelty": 0.3, "cost": 0.3}, {"name": "Al+Si+Cu (alloy)", "F": 0.62, "novelty": 0.65, "cost": 0.55}, {"name": "W+Re+Mo (refractory)", "F": 0.38, "novelty": 0.75, "cost": 0.95}];new Chart(document.getElementById("c"),{type:"bubble",data:{datasets:D.map(function(m){return{label:m.name,data:[{x:m.novelty,y:m.F,r:m.cost*25+5}],backgroundColor:"rgba("+Math.round(m.novelty*180)+","+(Math.round(m.F*180))+",100,0.75)",borderWidth:1,borderColor:"#374151"};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{font:{size:10},boxWidth:8}}},scales:{x:{min:0,max:1,title:{display:true,text:"Novelty score"}},y:{min:0,max:1,title:{display:true,text:"F_composite"}}}}})</script></body></html>
