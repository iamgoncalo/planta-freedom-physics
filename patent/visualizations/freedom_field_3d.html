var canvas  = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff, 1);

var scene = new THREE.Scene();
var cam   = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
cam.position.set(2, 1.5, 2);
cam.lookAt(0.5, 0.5, 0.5);

var ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

var dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
dirLight.position.set(2, 3, 2);
scene.add(dirLight);

DATA.forEach(function(pt) {
  var F   = pt.F;
  var geo = new THREE.SphereGeometry(0.025, 6, 6);
  var r   = Math.round((1 - F) * 220 + F * 40);
  var g   = Math.round((1 - F) * 40 + F * 200);
  var col = new THREE.Color('rgb(' + r + ',' + g + ',60)');
  var mat = new THREE.MeshPhongMaterial({ color: col, shininess: 20 });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pt.x, pt.y, pt.z);
  scene.add(mesh);
});

var t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.005;
  cam.position.set(2 * Math.cos(t), 1.5, 2 * Math.sin(t));
  cam.lookAt(0.5, 0.5, 0.5);
  renderer.render(scene, cam);
}
animate();

window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});
</script>
