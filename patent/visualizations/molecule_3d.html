<!DOCTYPE html><html><head><meta charset="utf-8"><title>Molecular Freedom Field — SIMULATED</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script><style>body{margin:0;padding:14px;background:#fff;font-family:sans-serif;}.t{font-size:15px;font-weight:500;margin-bottom:3px;}.s{font-size:11px;color:#6b7280;margin-bottom:14px;}</style></head><body><div class="t">V15: Molecular Freedom Field — F(r) around C+Si+Al composite</div><div class="s">T2+T5 · F=P/D vs radial distance from centre · Donor sites (high F) highlighted · SIMULATED</div><div style="position:relative;height:300px;"><canvas id="c"></canvas></div><script>var r=[]; for(var i=0;i<=20;i++){r.push(i*0.1);}var FC=r.map(function(x){return Math.exp(-x*x/0.5)*0.85+0.05;});var FSi=r.map(function(x){return Math.exp(-x*x/0.8)*0.72+0.03;});var FAl=r.map(function(x){return Math.exp(-x*x/1.2)*0.60+0.02;});new Chart(document.getElementById("c"),{type:"line",data:{labels:r.map(function(x){return x.toFixed(1)+"Å";}),datasets:[{label:"F(r) Carbon",data:FC,borderColor:"#1f2937",borderWidth:2,pointRadius:0,fill:false},{label:"F(r) Silicon",data:FSi,borderColor:"#3b82f6",borderWidth:2,pointRadius:0,fill:false},{label:"F(r) Aluminium",data:FAl,borderColor:"#d97706",borderWidth:2,pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"}},scales:{x:{title:{display:true,text:"Radial distance"}},y:{min:0,max:1,title:{display:true,text:"F(r) = P/D"}}}}})</script></body></html>
