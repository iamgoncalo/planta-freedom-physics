<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Intelligence Paradox — F=P/D SIMULATED</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>body{margin:0;background:#fff;font-family:sans-serif;padding:16px;}
h3{font-size:14px;margin-bottom:2px;}
.sub{font-size:11px;color:#6b7280;margin-bottom:12px;}
</style></head><body>
<h3>Intelligence Paradox (T4) — More Connectivity = Lower Freedom</h3>
<div class="sub">log(efficiency) = -0.384·log(λ₂). rho=-0.334, R²=0.962. Deucalion 2,987 trials. SIMULATED · seed=2026</div>
<canvas id="c" height="130"></canvas>
<script>
const D={"lambda2": [0.01, 0.09, 0.17, 0.25, 0.33, 0.41, 0.49, 0.57, 0.65, 0.73, 0.81, 0.89, 0.97, 1.05, 1.13, 1.21, 1.29, 1.37, 1.45, 1.53, 1.61, 1.69, 1.77, 1.85, 1.93, 2.01, 2.09, 2.17, 2.25, 2.33], "eff": [5.8614, 2.521, 1.9747, 1.7029, 1.5307, 1.4083, 1.3151, 1.2409, 1.1799, 1.1285, 1.0843, 1.0458, 1.0118, 0.9814, 0.9542, 0.9294, 0.9068, 0.8861, 0.867, 0.8493, 0.8329, 0.8175, 0.8031, 0.7896, 0.7769, 0.7648, 0.7535, 0.7427, 0.7324, 0.7227], "points": [{"lambda2": 1.36, "F": 0.5401, "label": "Dense"}, {"lambda2": 0.08, "F": 0.5906, "label": "Sparse"}], "coef": -0.384, "rho": -0.334, "R2": 0.962, "paradox": "More connectivity = LOWER freedom"};
new Chart(document.getElementById('c'),{type:'line',
  data:{labels:D.lambda2.map(v=>v.toFixed(2)),datasets:[
    {label:'Predicted efficiency',data:D.eff,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.05)',
      fill:true,borderWidth:2,pointRadius:0,tension:0.3},
    {label:'Deucalion points',data:D.lambda2.map((l,i)=>{
      for(const p of D.points)if(Math.abs(l-p.lambda2)<0.05)return p.F;return null;}),
      borderColor:'#dc2626',pointRadius:8,pointStyle:'crossRot',showLine:false,borderWidth:2},
  ]},
  options:{responsive:true,
    plugins:{legend:{display:true,position:'bottom'},
      title:{display:true,text:'Predicted efficiency vs Fiedler value λ₂ (formula: exp('+D.coef+'·ln(λ₂)))'}},
    scales:{
      y:{title:{display:true,text:'Agent efficiency / F_global'}},
      x:{title:{display:true,text:'Fiedler value λ₂ (graph connectivity)'}}}}});
</script></body></html>
