# ─────────────────────────────────────────────────────
# COMPLIANCE MAPPING — canal D → norma → limite
# ─────────────────────────────────────────────────────
channel_compliance_map:
  co2:
    primary_law: "portaria_353a_2013"
    eu_standard: "en_16798_2019"
    global: "ashrae_62_1_2022"
    critical_ppm: 1000
    alert_ppm: 800
    d_weight_config: 0.22

  temp:
    primary_law: "iso_7730_pt"
    eu_standard: "en_16798_2019"
    global: "ashrae_55_2020"
    winter_min_c: 18.0
    winter_max_c: 22.0
    summer_min_c: 22.0
    summer_max_c: 26.0
    d_weight_config: 0.40

  lux:
    primary_law: "en_12464_pt"
    eu_standard: "en_16798_2019"
    global: "well_v2"
    classroom_min_lux: 300
    classroom_target_lux: 500
    ugr_max: 19
    d_weight_config: 0.12

  noise:
    primary_law: "iso_11690_pt"
    eu_standard: "en_16798_2019"
    global: "well_v2"
    max_db: 45
    cognitive_work_db: 40
    d_weight_config: 0.05

  humidity:
    primary_law: "iso_7730_pt"
    eu_standard: "en_16798_2019"
    global: "ashrae_55_2020"
    min_pct: 30
    max_pct: 70
    target_pct: 50
    d_weight_config: 0.16

  energy:
    primary_law: "epbd_2024"
    eu_standard: "energy_efficiency_directive"
    global: "iso_50001_2018"
    horse_cft_area_m2: 950
    monitoring_required: true

# Financial consequences (used by compliance checker)
financial_consequences:
  co2_legal_breach_per_event_eur: 500      # conservative estimate
  temp_legal_breach_per_event_eur: 200
  lux_legal_breach_per_event_eur: 100
  annual_fine_max_eur: 45000               # ACT maximum
  productivity_loss_co2_high_pct: 50       # WHO / -50% produtividade
  time_indoors_pct: 90                     # OMS — 90% do tempo em interiores
  buildings_non_compliant_portugal_pct: 75 # JRC 2022 / INE / DGEG
